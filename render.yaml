services:
  - type: web
    name: lumen-bank-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_LOGIN
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
