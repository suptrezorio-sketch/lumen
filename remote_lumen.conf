server {
    server_name ic-fin.com www.ic-fin.com;

    # Main App
    location / {
        root /var/www/app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # CRM / Admin
    location /admin {
        alias /var/www/crm;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Assets routing for Admin (since index.html expects /assets/)
    location /assets/ {
        root /var/www/app;
    }

    # Proxy PocketBase API
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # PocketBase admin UI
    location /_/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ic-fin.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ic-fin.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.ic-fin.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = ic-fin.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name ic-fin.com www.ic-fin.com;
    return 404; # managed by Certbot




}